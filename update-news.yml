# .github/workflows/update-news.yml に配置してください
name: Update AI News Weekly

on:
  schedule:
    - cron: "0 22 * * 0"   # 毎週月曜 朝7時（JST）= 日曜 22:00 UTC
  workflow_dispatch:         # 手動実行も可能

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch AI news
        run: python update_news.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json
          git diff --cached --quiet || git commit -m "chore: weekly AI news update"
          git push
